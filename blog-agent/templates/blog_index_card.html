<!-- Blog Card - Auto Generated -->
<div class="col-lg-4 col-md-6">
    <div class="blog-card-modern"
        style="background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.08); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.05);">
        <div style="position: relative; overflow: hidden; height: 200px;">
            <div
                style="width: 100%; height: 100%; background: {{ badge_color }}; display: flex; align-items: center; justify-content: center;">
                <i class="bi {{ topic_icon }}" style="font-size: 3rem; color: rgba(255,255,255,0.5);"></i>
            </div>
            <div
                style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);">
            </div>
            <span
                style="position: absolute; top: 16px; left: 16px; background: {{ badge_color }}; color: white; padding: 5px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;">
                <i class="bi bi-robot me-1"></i>{{ badge }}
            </span>
            <span
                style="position: absolute; bottom: 16px; left: 16px; color: white; font-size: 0.8rem; opacity: 0.9;">
                <i class="bi bi-clock me-1"></i>{{ read_time }} min read
            </span>
        </div>
        <div style="padding: 24px;">
            <h5 style="font-weight: 700; font-size: 1.15rem; margin-bottom: 12px; color: #1d1d1f;">
                {{ title }}</h5>
            <p style="color: #6e6e73; font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px;">{{ short_description }}</p>
            <a href="{{ slug }}.html" class="d-flex align-items-center gap-2"
                style="color: #0d6efd; font-weight: 700; text-decoration: none; transition: all 0.3s ease;">
                Read Article <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>
</div>
