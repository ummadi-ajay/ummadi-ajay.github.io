<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} | MakerWorks Blog</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="{{ title }} | MakerWorks Blog">
    <meta name="description" content="{{ meta_description }}">
    <meta name="keywords" content="{{ keywords }}">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://makerworkslab.in/blog/{{ slug }}.html">
    <meta property="og:title" content="{{ title }} | MakerWorks Blog">
    <meta property="og:description" content="{{ meta_description }}">
    <meta property="og:image" content="https://makerworkslab.in/blog/blogphotos/{{ slug }}.jpg">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ title }} | MakerWorks Blog">
    <meta name="twitter:description" content="{{ meta_description }}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="canonical" href="https://makerworkslab.in/blog/{{ slug }}.html">

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/styles.css">

    <!-- Scripts -->
    <script src="/components.js" defer></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": "{{ title }}",
        "description": "{{ meta_description }}",
        "author": {
            "@type": "Organization",
            "name": "MakerWorks"
        },
        "publisher": {
            "@type": "Organization",
            "name": "MakerWorks",
            "logo": {
                "@type": "ImageObject",
                "url": "https://makerworkslab.in/images/logo.png"
            }
        },
        "datePublished": "{{ date_iso }}",
        "dateModified": "{{ date_iso }}",
        "mainEntityOfPage": "https://makerworkslab.in/blog/{{ slug }}.html"
    }
    </script>

    <style>
        .blog-content img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 2rem auto;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .blog-content pre {
            background-color: #282c34;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            position: relative;
        }

        .blog-content h2 {
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            color: #1d1d1f;
            font-weight: 700;
        }

        .blog-content h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            color: #444;
            font-weight: 600;
        }

        .blog-content p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4a4a4a;
            margin-bottom: 1.5rem;
        }

        .blog-content ul,
        .blog-content ol {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4a4a4a;
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }

        .blog-content li {
            margin-bottom: 0.5rem;
        }

        .blog-content blockquote {
            border-left: 4px solid #ff6600;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            background: #f8f9fa;
            border-radius: 0 12px 12px 0;
            font-style: italic;
            color: #555;
        }

        .blog-header {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 120px 0 60px;
            margin-bottom: 60px;
        }

        .featured-image-placeholder {
            width: 100%;
            height: 350px;
            border-radius: 12px;
            background: {{ badge_color }};
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .featured-image-placeholder i {
            font-size: 5rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .featured-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .image-credit {
            font-size: 0.85rem;
            color: #6c757d;
            text-align: right;
            margin-bottom: 2rem;
        }

        .image-credit a {
            color: #0d6efd;
            text-decoration: none;
        }

        .image-credit a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div id="navbar-placeholder"></div>

    <!-- Article Header -->
    <header class="blog-header">
        <div class="container text-center">
            <span class="badge mb-3 rounded-pill px-3 py-2" style="background: {{ badge_color }}; color: white;">{{ badge }}</span>
            <h1 class="display-4 fw-bold mb-3">{{ title }}</h1>
            <div class="text-muted">
                <i class="bi bi-calendar3 me-2"></i>{{ date }}
                <span class="mx-2">&bull;</span>
                <i class="bi bi-person me-2"></i>{{ author }}
            </div>
        </div>
    </header>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 blog-content">
                {% if image_info %}
                <img src="blogphotos/{{ image_info.filename }}" alt="{{ title }}" class="featured-image img-fluid">
                <div class="image-credit">
                    Photo by <a href="{{ image_info.photographer_url }}" target="_blank">{{ image_info.photographer }}</a> on <a href="{{ image_info.pexels_url }}" target="_blank">Pexels</a>
                </div>
                {% else %}
                <div class="featured-image-placeholder">
                    <i class="bi {{ topic_icon }}"></i>
                </div>
                {% endif %}

                {{ content }}

                <hr class="my-5">

                <div class="d-flex justify-content-between align-items-center">
                    <a href="/blog/" class="btn btn-outline-primary rounded-pill px-4">
                        <i class="bi bi-arrow-left me-2"></i>Back to Blog
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            hljs.highlightAll();
        });
    </script>
</body>

</html>
