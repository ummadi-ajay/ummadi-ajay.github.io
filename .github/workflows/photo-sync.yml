name: Sync Photos from Google Drive

on:
  schedule:
    # Daily at 7:00 AM IST (1:30 AM UTC)
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-photos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r photo-agent/requirements.txt

      - name: Sync photos from Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          cd photo-agent
          python agent.py

      - name: Commit and push changes
        run: |
          git config user.name "MakerWorks Photo Bot"
          git config user.email "bot@makerworkslab.in"
          git add gallery/ photo-agent/state.json
          git diff --staged --quiet || git commit -m "Auto-sync: New photos from Google Drive"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
