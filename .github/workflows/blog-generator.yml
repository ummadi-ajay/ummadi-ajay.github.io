name: Generate Robotics Blog Post

on:
  schedule:
    # Mon & Thu at 10:00 AM IST (4:30 AM UTC)
    - cron: '30 4 * * 1,4'
  workflow_dispatch: # Manual trigger button

permissions:
  contents: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r blog-agent/requirements.txt

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cd blog-agent
          python agent.py

      - name: Commit and push changes
        run: |
          git config user.name "MakerWorks Blog Bot"
          git config user.email "bot@makerworkslab.in"
          git add blog/ blog-agent/state.json index.html
          git diff --staged --quiet || git commit -m "Auto-publish: New robotics blog post"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
