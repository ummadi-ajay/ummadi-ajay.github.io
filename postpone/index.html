<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>MakerWorks Lab | Postpone Class</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#1e3a8a",
            "secondary": "#1e40af",
            "accent": "#2563eb",
            "surface": "#ffffff",
          },
          fontFamily: { "sans": ["Inter", "sans-serif"] },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.37)',
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    
    body {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      min-height: 100vh;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.5);
    }
    
    .hidden-state {
      display: none !important;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4 text-slate-800 font-sans relative overflow-hidden">
  
  <!-- Background Decorations -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob animation-delay-2000"></div>

  <div class="w-full max-w-md glass-card rounded-3xl p-8 relative z-10 transition-all duration-500" id="main-container">
    
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-100 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-inner">
        <span class="material-symbols-outlined text-4xl text-blue-600">event_busy</span>
      </div>
      <h1 class="text-3xl font-black tracking-tight gradient-text mb-2">Class Portal</h1>
      <p class="text-sm text-slate-500 font-medium">Manage your class schedules securely.</p>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="transition-opacity duration-300">
      <form id="login-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Student Email</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
            <input type="email" id="email" required class="w-full pl-10 pr-4 py-3 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder-slate-400 font-medium" placeholder="student@example.com">
          </div>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
            <input type="password" id="password" required class="w-full pl-10 pr-4 py-3 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder-slate-400 font-medium" placeholder="••••••••">
          </div>
        </div>
        <button type="submit" id="login-btn" class="w-full btn-primary text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 mt-4">
          <span>Sign In</span>
          <span class="material-symbols-outlined text-sm">arrow_forward</span>
        </button>
        <div id="login-error" class="hidden text-red-500 text-sm font-semibold text-center mt-2 bg-red-50 p-2 rounded-lg border border-red-100"></div>
      </form>
    </div>

    <!-- Postpone Class Section -->
    <div id="postpone-section" class="hidden-state transition-opacity duration-300">
      <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6 flex items-start gap-3">
        <span class="material-symbols-outlined text-blue-500 shrink-0">info</span>
        <p class="text-xs text-blue-700 font-medium leading-relaxed">
          Classes can only be postponed with a minimum of <strong>2 weeks (14 days)</strong> advance notice as per MakerWorks Lab policy.
        </p>
      </div>

      <form id="postpone-form" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Class Date to Postpone</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">calendar_month</span>
            <input type="date" id="postpone-date" required class="w-full pl-10 pr-4 py-3 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all font-medium text-slate-700">
          </div>
          <p id="date-error" class="hidden text-red-500 text-xs font-semibold mt-1"></p>
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Reason for Postponement</label>
          <textarea id="postpone-reason" required rows="3" class="w-full p-3 bg-white/50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all font-medium text-slate-700 placeholder-slate-400" placeholder="Please specify why you need to postpone..."></textarea>
        </div>
        <button type="submit" id="submit-btn" class="w-full btn-primary text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2">
          <span>Submit Request</span>
          <span class="material-symbols-outlined text-sm">send</span>
        </button>
        <div id="postpone-message" class="hidden text-center text-sm font-semibold mt-3 p-3 rounded-xl"></div>
      </form>
      
      <div class="mt-6 text-center">
        <button id="logout-btn" class="text-sm font-semibold text-slate-500 hover:text-red-500 transition-colors flex items-center justify-center gap-1 mx-auto">
          <span class="material-symbols-outlined text-base">logout</span> Sign Out
        </button>
      </div>
    </div>
    
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
